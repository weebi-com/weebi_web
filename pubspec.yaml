name: web_admin
description: Weebi Web Admin
publish_to: 'none'
version: 1.0.3

environment:
  sdk: '>=3.11.1 <4.0.0'

# avoid risking `flutter pub upgrade --major-versions`
# prefer `flutter pub outdated`
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any #^0.19.0
  shared_preferences: ^2.2.2
  provider: ^6.1.2
  go_router: ^13.2.0
  google_fonts: ^6.3.2
  pointer_interceptor: ^0.10.1
  flutter_form_builder: ^10.3.0+2
  form_builder_validators: ^11.1.2
  awesome_dialog: ^3.2.0
  file_picker: ^8.0.0

  grpc: ^4.0.1 # grpc_web not exported from protos
  flutter_dotenv: ^5.2.1

  package_info_plus: ^8.3.1

  protobuf: ^4.0.0
  protos_weebi: ^1.1.0 # export protos (1.1.0+ for billing)
  models_weebi: any

  auth_weebi: ^1.0.6
  boutiques_weebi: ^1.0.6
  devices_weebi: ^1.0.6
  users_weebi: ^1.0.6+1
  accesses_weebi: ^1.0.6
  gatekeeper_weebi: ^1.0.6
  design_weebi: ^0.1.1

#dependency_overrides:
dev_dependencies:
  flutter_test:
    sdk: flutter


  flutter_lints: ^3.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/images/app_logo.png
    - assets/dotenv_lcl.txt
    - assets/dotenv_dev.txt
    - assets/dotenv_prd.txt

  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages

flutter_intl:
  enabled: true
  class_name: Lang
  main_locale: en
